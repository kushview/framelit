name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  macos-notarized:
    name: macOS Notarized DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.3.*'
          version: '6.11.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia'

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain

      - name: Configure
        env:
          FRAMELIT_CODESIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DFRAMELIT_CODESIGN_IDENTITY="$FRAMELIT_CODESIGN_IDENTITY"

      - name: Build
        run: cmake --build build

      - name: Verify app signature
        run: |
          codesign --verify --deep --strict --verbose=2 build/Framelit.app
          codesign -dv --verbose=4 build/Framelit.app

      - name: Build DMG
        run: scripts/dmg.sh

      - name: Sign DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp Framelit.dmg
          codesign --verify --verbose=2 Framelit.dmg

      - name: Notarize and staple
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          mkdir -p private_keys
          KEY_PATH="private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf "%s" "$APPLE_API_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          xcrun notarytool submit Framelit.dmg \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple Framelit.dmg
          xcrun stapler validate Framelit.dmg

      - name: Upload notarized DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Framelit-macOS-notarized-dmg
          path: Framelit.dmg
          if-no-files-found: error

      - name: Cleanup keychain and secrets
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f certificate.p12
          rm -rf private_keys
